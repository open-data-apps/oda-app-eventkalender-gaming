name: Build Release Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
      - uses: actions/checkout@v4.2.2

      - name: Determine project name
        id: project
        run: echo "name=$(basename ${{ github.repository }})" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          zip -r "${{ steps.project.outputs.name }}.zip" \
            app \
            assets \
            app-package.json \
            CHANGELOG.md

      - name: Delete old release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest-build --yes 2>/dev/null || true
          git push --delete origin latest-build 2>/dev/null || true

      - name: Upload zip as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create latest-build \
            --title "Latest Build" \
            --notes "Automatisch generierter Release-Build" \
            --latest \
            "${{ steps.project.outputs.name }}.zip"
