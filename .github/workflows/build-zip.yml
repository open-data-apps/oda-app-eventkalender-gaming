name: Build Release Zip

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  zip:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Determine project name
        id: project
        run: echo "name=$(basename ${{ github.repository }} | tr '-' '_')" >> $GITHUB_OUTPUT

      - name: Create zip archive
        run: |
          zip -r "${{ steps.project.outputs.name }}.zip" \
            app \
            assets \
            app-package.json \
            CHANGELOG.md

      - name: Commit and push updated zip
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.project.outputs.name }}.zip"
          git commit -m "chore: update release zip [skip ci]"
          git push
