<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090a0f"/>
      <stop offset="100%" stop-color="#131522"/>
    </linearGradient>
    
    <!-- Neon Cyan Glow -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Neon Pink Glow -->
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Rect -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)" stroke="#242942" stroke-width="6"/>

  <!-- Glowing Neon Border Grid -->
  <rect x="25" y="25" width="462" height="462" rx="90" ry="90" fill="none" stroke="#00f0ff" stroke-width="2" opacity="0.3" filter="url(#glowCyan)"/>

  <!-- Calendar Page Base (Cyberpunk Style) -->
  <path d="M120 150 C120 130, 130 120, 150 120 L362 120 C382 120, 392 130, 392 150 L392 392 C392 412, 382 422, 362 422 L150 422 C130 422, 120 412, 120 392 Z" 
        fill="#1a1d30" stroke="#242942" stroke-width="8" opacity="0.85" />
  
  <!-- Calendar Header Bar (Pink Glow) -->
  <path d="M120 150 C120 130, 130 120, 150 120 L362 120 C382 120, 392 130, 392 150 L392 190 L120 190 Z" 
        fill="#ff007f" filter="url(#glowPink)" opacity="0.9" />

  <!-- Calendar Hanger Rings -->
  <rect x="170" y="85" width="24" height="60" rx="12" fill="#00f0ff" filter="url(#glowCyan)"/>
  <rect x="318" y="85" width="24" height="60" rx="12" fill="#00f0ff" filter="url(#glowCyan)"/>

  <!-- Controller Motif (Centered on Calendar Page) -->
  <g transform="translate(0, 30)">
    <!-- Controller Body -->
    <path d="M160 270 C160 230, 210 220, 256 220 C302 220, 352 230, 352 270 C352 320, 320 370, 300 370 C280 370, 270 340, 256 340 C242 340, 232 370, 212 370 C192 370, 160 320, 160 270 Z" 
          fill="#090a0f" stroke="#00f0ff" stroke-width="8" filter="url(#glowCyan)" />

    <!-- D-Pad (Left side) -->
    <path d="M200 270 L210 270 L210 260 L220 260 L220 270 L230 270 L230 280 L220 280 L220 290 L210 290 L210 280 L200 280 Z" 
          fill="#ff007f" filter="url(#glowPink)"/>

    <!-- Action Buttons (Right side) -->
    <circle cx="286" cy="275" r="7" fill="#39ff14" filter="url(#glowCyan)"/>
    <circle cx="304" cy="265" r="7" fill="#ffb800"/>
    <circle cx="304" cy="285" r="7" fill="#ff003c"/>
    <circle cx="322" cy="275" r="7" fill="#00f0ff" filter="url(#glowCyan)"/>

    <!-- Thumbsticks -->
    <circle cx="230" cy="315" r="14" fill="#1a1d30" stroke="#ff007f" stroke-width="3" filter="url(#glowPink)"/>
    <circle cx="282" cy="315" r="14" fill="#1a1d30" stroke="#ff007f" stroke-width="3" filter="url(#glowPink)"/>
    
    <!-- Star / Quest mark in center -->
    <path d="M256 250 L259 258 L268 258 L261 263 L263 271 L256 266 L249 271 L251 263 L244 258 L253 258 Z" 
          fill="#ffffff" filter="url(#glowCyan)"/>
  </g>
</svg>
